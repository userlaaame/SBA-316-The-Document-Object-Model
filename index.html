<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./app.js" defer></script>
</head>

<body>
    <!-- this is the header and catergory using elementbyid and text requirements -->
    <header>
        <div id="category-display" class="header-strip">
            <h1>Hangman</h1>
            <h2 id="category-title">Category: -</h2>
            <p id="hint-text" class="hint-text">Hint: <span id="hint-content"></span></p>
        </div>
    </header>

    <!-- ================Main game area====================== -->
    <main>
        <!-- Let's try to build the gallows for the body first using a SVG to 
 keep html and js logic seperate and fluid -->
        <svg id="hangman-svg" viewbox="0 0 200 220" aria-label="Hangman drawing" role="img">

            <line x1="20" y1="210" x2="180" y2="210" /> <!-- base -->
            <line x1="60" y1="210" x2="60" y2="10" /> <!-- pole -->
            <line x1="60" y1="10" x2="130" y2="10" /> <!-- beam -->
            <line x1="130" y1="10" x2="130" y2="30" /> <!-- noose -->

            <!-- Body parts, they're hidden in CSS -->
            <circle id="p-head" class="hidden" cx="130" cy="50" r="20" fill="none" />

            <line id="p-body" class="hidden" x1="130" y1="70" x2="130" y2="130" />

            <line id="p-left-arm" class="hidden" x1="130" y1="85" x2="100" y2="110" />

            <line id="p-right-arm" class="hidden" x1="130" y1="85" x2="160" y2="110" />

            <line id="p-right-leg" class="hidden" x1="130" y1="130" x2="160" y2="170" />

            <line id="p-left-leg" class="hidden" x1="130" y1="130" x2="100" y2="170" />

        </svg>
        <!-- JS letter slots are stamped here -->
        <div id="word-display" aria-label="Word to guess"></div>
        <!-- Template is how I satisfy both DocumentFragment and cloneNode 
     from a single function  -->
        <template id="letter-slot-template">
            <span class="letter-slot" data-letter=""></span>
        </template>


        <!-- STATUS - wrong guess count list -->
        <div id="status-area">
            <p id="wrong-counter">Wrong guesses: <span id="wrong-count">0</span> / 6</p>
            <div id="guessed-letters" aria-live="polite"></div>
        </div>

        <!-- GUESS FORM -->
        <form id="guess-form" autocomplete="off" novalidate>
            <label for="guess-input">Guess a letter:</label>
            <input id="guess-input" type="text" required minlength="1" maxlength="1" pattern="[a-zA-Z]"
                placeholder="a-z" aria-label="Type a letter" />
            <!-- Guess button here -->
            <button type="submit">Guess</button>
            <!-- Javascript writes validation errors here -->
            <p id="input-error" class="error-msg" aria-live="polite"></p>
        </form>

        <!-- ON SCREEN KEYBOARD  -->
        <div id="letter-buttons" aria-label="Letter keyboard"></div>

        <!-- GAME RESULT/MESSAGE/BUTTON-hidden until win or lose -->
        <div id="game-message" class="hidden" aria-live="assertive">
            <p id="result-text"></p>
            <p id="answer-reveal"></p>
            <button id="restart-btn">Play Again</button>
        </div>

    </main>

</body>


</html>
