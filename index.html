<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./app.js" defer></script>

    <div id="category-display">
        <!-- Header Section -->
        <div class="header-strip">
            <h2 id="category-title">Category: All</h2>
            <p id="hint-text" class="hint-text">Hint:
                <span style="display: none;">Select a category to begin.

                </span>
            </p>

        </div>
</head>

<body>
    <!-- Template is how I satisfy both DocumentFragment and cloneNode 
     from a single function  -->
    <template id="letter-slot-template">
        <span class="letter-slot" data-letter="">

        </span>
    </template>

</body>

<!-- Let's try to build the gallows for the body first using a SVG to 
 keep html and js logic seperate and fluid -->
<svg id="hangman-svg" viewbox="0 0 200 220" aria-label="Hangman drawing" role="img">

    <line x1="20" y1="210" x2="180" y2="210" /> <!-- base -->
    <line x1="60" y1="210" x2="60" y2="10" /> <!-- pole -->
    <line x1="60" y1="10" x2="130" y2="10" /> <!-- beam -->
    <line x1="130" y1="10" x2="130" y2="30" /> <!-- noose -->

    <!-- Body parts, they're hidden in CSS -->
    <circle id:"p-head" class="hidden" cx="130" cy="50" r="20" fill="none" />

    <line id="p-body" class="hidden" x1="130" y1="70" x2="130" y2="130" />

    <line id="p-left-arm" class="hidden" x1="130" y1="85" x2="100" y2="110" />

    <line id="p-right-arm" class="hidden" x1="130" y1="85" x2="160" y2="110" />

    <line id="p-right-leg" class="hidden" x1="130" y1="130" x2="160" y2="170" />

    <line id="p-left-leg" class="hidden" x1="130" y1="130" x2="100" y2="170" />














</svg>

</html>
